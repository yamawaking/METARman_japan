name: Update METAR Map

on:
  schedule:
    - cron: '0 * * * *'  # 1時間おきに実行
  workflow_dispatch:      # 手動実行も可能にする

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install folium requests

      - name: Run script
        run: python metarman.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_filename: index.html
