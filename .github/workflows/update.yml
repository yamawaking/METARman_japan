name: Update METAR Map

on:
  schedule:
    - cron: '0 * * * *'  # 1時間おきに自動実行
  workflow_dispatch:      # 今すぐ動かすボタンを有効化

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # これが重要：ファイルを書き換える許可
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4  # ← ここがエラーの原因でした。修正済みです！
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install folium requests

      - name: Run script
        run: python metarman.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_filename: index.html
      - name: Run script
        run: python metarman.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: . # 今いる場所にあるファイルを全部公開用にまとめる

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
